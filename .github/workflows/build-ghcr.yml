name: Build & Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    name: Build amd64 → GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write VERSION file
        run: |
          TAG=$(git describe --tags --always --dirty 2>/dev/null || echo "${GITHUB_SHA::8}")
          echo "${TAG}" > VERSION
          echo "VERSION=${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/new-api:latest
            ghcr.io/${{ github.repository_owner }}/new-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "✅ Pushed to ghcr.io/${{ github.repository_owner }}/new-api:latest" >> $GITHUB_STEP_SUMMARY
